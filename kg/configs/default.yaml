env_file: ".env"

paths:
  chunks_dir: "../process/artifacts/manuals"
  artifacts_dir: "artifacts"

llm:
  base_url: ""
  api_key: ""
  model: ""
  max_retries: 3
  timeout: 120.0

graph_store:
  backend: "kuzu"
  db_path: "state/graph.db"

builder:
  max_chunk_pair_tokens: 3000
  batch_size: 10

retriever:
  max_hops: 2
  max_expanded_chunks: 8
  seed_count: 3
  graph_bonus_weight: 0.15
