db_path: ../process/artifacts/manual_chunks.db
chunks_dir: ../process/artifacts/manuals

api:
  env_file: .env
  api_key_env: KAFU_LLM_API_KEY
  base_url_env: KAFU_LLM_BASE_URL

embedding:
  model_name: qwen3-vl-embedding
  query_prompt: "Represent this customer support question for retrieving relevant product manual passages:"
  document_prompt: "Represent this product manual passage with its attached image when present:"
  endpoint_path: /api/v1/services/embeddings/multimodal-embedding/multimodal-embedding
  enable_fusion: true
  dimension: 1024
  max_images_per_request: 5
  timeout_seconds: 60.0
  max_retries: 3
  retry_backoff_seconds: 1.0

vector_store:
  collection_name: manual_chunks
  metric_type: COSINE
  index_type: AUTOINDEX
  milvus_timeout: 10.0

rerank:
  enabled: true
  model_name: qwen3-rerank
  prompt: "<task>Judge whether the manual passage can directly answer the user's question.</task> <preference>Prefer passages with concrete steps, locations, safety guidance, troubleshooting, specifications, or figure-related details.</preference>"
  min_score:
  timeout_seconds: 60.0
  max_retries: 2

fusion:
  method: rrf
  rrf_k: 60
  channel_weights:
    dense: 0.65
    bm25: 0.35

params:
  bm25_top_k: 20
  dense_top_k: 20
  hybrid_top_k: 10
  rerank_candidate_k: 20
  return_mid_top_k: 5
  return_big_top_k: 3
  allow_dense_fallback: true
