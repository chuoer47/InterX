# LLM endpoint — all routed through InterX gateway
llm:
  env_file: .env
  api_key_env: INTERX_GATEWAY_API_KEY
  base_url_env: INTERX_GATEWAY_BASE_URL
  model_name: qwen3-max

# Memory strategy
memory:
  strategy: sliding_summary    # sliding_window / summary / sliding_summary
  window_size: 5               # keep last N turns
  max_summary_tokens: 500      # max tokens for compressed summary
  summary_trigger_turns: 10    # start summarizing after N turns
  temperature: 0.3
  timeout_seconds: 30.0
  max_retries: 1

# Query rewriting
query_rewrite:
  enabled: true
  temperature: 0.1
  max_tokens: 256
  timeout_seconds: 30.0
  max_retries: 1

# Session persistence
session_dir: sessions
