global:
  scrape_interval: 15s

scrape_configs:
  - job_name: interx_litellm
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:4000']
  - job_name: interx_semantic_cache
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:4010']
