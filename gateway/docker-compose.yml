services:
  redis:
    image: redis:7-alpine
    container_name: interx-gateway-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./state/redis:/data

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: interx-gateway-litellm
    depends_on:
      - redis
    env_file:
      - .env
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.stable.yaml:/app/config.yaml:ro
      - ./state:/app/state
      - ./logs:/app/logs

  semantic-cache:
    build:
      context: ./extensions/semantic_cache
    container_name: interx-semantic-cache
    depends_on:
      - redis
      - litellm
    env_file:
      - .env
    ports:
      - "4010:4010"
    volumes:
      - ./state:/app/state

  prometheus:
    image: prom/prometheus:latest
    container_name: interx-gateway-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: interx-gateway-grafana
    depends_on:
      - prometheus
    env_file:
      - .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    ports:
      - "3000:3000"
    volumes:
      - ./grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
